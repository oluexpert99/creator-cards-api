name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # package-lock.json is gitignored by the template, so use `npm install` (not `npm ci`).
      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npx eslint endpoints/creator-cards services/creator-cards models/creator-card.js messages/creator-cards.js

      - name: Test (unit + integration on in-memory MongoDB)
        run: npm test

  deploy:
    # Only deploy after tests pass, and only on a push to the main branch (never on PRs).
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
